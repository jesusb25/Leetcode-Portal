# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploys two services from this monorepo:
#   - leetcode-api : Express API (Node web service)
#   - leetcode-web : Vite React SPA (static site)
# The database stays on Supabase (external) — set DATABASE_URL accordingly.
#
# NOTE: The API runs via `tsx`, not `node dist/index.js`. The compiled output
# imports the `@repo/db` / `@repo/shared` workspace packages, which resolve to
# raw TypeScript source, so plain `node` can't run it. `tsx` handles that.

services:
  # ---------- API: Express (Node) ----------
  - type: web
    name: leetcode-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm --filter @repo/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL # Supabase connection string (app runtime can use pooler port 6543)
        sync: false
      - key: SUPABASE_URL # Supabase project URL; used to build the JWKS URL for verifying access tokens
        sync: false
      - key: CORS_ORIGIN # Allowed browser origin(s) for the API, comma-separated. No trailing slash (exact-match check).
        value: https://leetcode-web.onrender.com

  # ---------- Web: Vite SPA (static) ----------
  - type: web
    name: leetcode-web
    runtime: static
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @repo/web build
    staticPublishPath: apps/web/dist
    envVars:
      # VITE_* vars are baked in at build time. Changing this requires a
      # rebuild (Clear build cache & deploy), not just a restart.
      - key: VITE_API_URL
        value: https://leetcode-api-9kz7.onrender.com/api/v1
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    routes:
      # SPA fallback so react-router deep links resolve to index.html
      - type: rewrite
        source: /*
        destination: /index.html
