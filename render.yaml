# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploys two services from this monorepo:
#   - leetcode-api : Express API (Node web service)
#   - leetcode-web : Vite React SPA (static site)
# The database stays on Supabase (external) — set DATABASE_URL accordingly.
#
# NOTE: The API runs via `tsx`, not `node dist/index.js`. The compiled output
# imports the `@repo/db` / `@repo/shared` workspace packages, which resolve to
# raw TypeScript source, so plain `node` can't run it. `tsx` handles that.

services:
  # ---------- API: Express (Node) ----------
  - type: web
    name: leetcode-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter @repo/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL # Supabase connection string (app runtime can use pooler port 6543)
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DEV_USER_ID
        sync: false

  # ---------- Web: Vite SPA (static) ----------
  - type: web
    name: leetcode-web
    runtime: static
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @repo/web build
    staticPublishPath: apps/web/dist
    envVars:
      # VITE_* vars are baked in at build time. After the API deploys, set
      # VITE_API_URL to https://<your-api>.onrender.com/api/v1 and redeploy.
      - key: VITE_API_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    routes:
      # SPA fallback so react-router deep links resolve to index.html
      - type: rewrite
        source: /*
        destination: /index.html
